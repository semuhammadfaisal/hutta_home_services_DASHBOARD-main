<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backend Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .test { background: white; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .success { border-left: 4px solid #4CAF50; }
        .error { border-left: 4px solid #f44336; }
        .pending { border-left: 4px solid #ff9800; }
        button { background: #4CAF50; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; margin: 5px; }
        button:hover { background: #45a049; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🔧 Backend Connectivity Test</h1>
    <button onclick="runAllTests()">Run All Tests</button>
    <button onclick="clearResults()">Clear Results</button>
    
    <div id="results"></div>

    <script>
        const API_BASE = 'http://localhost:10000/api';
        
        async function testEndpoint(name, url, options = {}) {
            const resultDiv = document.createElement('div');
            resultDiv.className = 'test pending';
            resultDiv.innerHTML = `<h3>${name}</h3><p>Testing...</p>`;
            document.getElementById('results').appendChild(resultDiv);
            
            try {
                const response = await fetch(url, options);
                const data = await response.json();
                
                resultDiv.className = 'test success';
                resultDiv.innerHTML = `
                    <h3>✅ ${name}</h3>
                    <p><strong>Status:</strong> ${response.status} ${response.statusText}</p>
                    <p><strong>Response:</strong></p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                resultDiv.className = 'test error';
                resultDiv.innerHTML = `
                    <h3>❌ ${name}</h3>
                    <p><strong>Error:</strong> ${error.message}</p>
                `;
            }
        }
        
        async function runAllTests() {
            document.getElementById('results').innerHTML = '';
            
            // Test 1: Health check
            await testEndpoint('Health Check', `${API_BASE}/health`);
            
            // Test 2: Auth endpoint (should fail without credentials)
            await testEndpoint('Auth Login (Expected to fail)', `${API_BASE}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: 'test@test.com', password: 'test' })
            });
            
            console.log('All tests completed');
        }
        
        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }
        
        // Auto-run on load
        window.onload = () => {
            console.log('Testing backend at:', API_BASE);
            runAllTests();
        };
    </script>
</body>
</html>
